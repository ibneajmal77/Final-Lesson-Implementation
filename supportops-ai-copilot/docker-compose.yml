services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_NAME: supportops-ai-copilot
      APP_ENV: docker
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://supportops:supportops@postgres:5432/supportops
      REDIS_URL: redis://redis:6379/0
      MODEL_PROVIDER: mock
      MODEL_API_KEY: ""
      MODEL_NAME: gpt-5.6
      MODEL_BASE_URL: https://api.openai.com/v1
      MODEL_TIMEOUT_SECONDS: "30"
      MODEL_MAX_OUTPUT_TOKENS: "1200"
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: supportops
      POSTGRES_PASSWORD: supportops
      POSTGRES_DB: supportops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportops"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-ui:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-ui:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379:0
    ports:
      - "8082:8081"
    depends_on:
      redis:
        condition: service_healthy
