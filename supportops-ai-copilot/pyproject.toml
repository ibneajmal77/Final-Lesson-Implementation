[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["apps/api", "packages/db", "packages/domain"]
addopts = "-p no:cacheprovider"

[tool.ruff]
line-length = 100
target-version = "py311"
cache-dir = "ruff_cache"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["supportops_api", "supportops_db", "supportops_domain"]
