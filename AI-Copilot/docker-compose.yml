services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_NAME: supportops-ai-copilot
      APP_ENV: docker
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://supportops:supportops@postgres:5432/supportops
      REDIS_URL: redis://redis:6379/0
      MODEL_PROVIDER: mock
      MODEL_API_KEY: ""
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: supportops
      POSTGRES_PASSWORD: supportops
      POSTGRES_DB: supportops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
